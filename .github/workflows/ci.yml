name: CI

on:
  push:
    branches: [dev, main] # dev = snapshot verification; main = formal (post-merge)
  pull_request:
    branches: [main] # gate the dev -> main PR

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap sanity: the wrapper is pure Go, so it compiles/vets against the upstream
  # library without gomobile or the Android NDK. The heavy AAR build lives in
  # release.yml (tag-triggered), since it needs the SDK/NDK and only matters on
  # release.
  check:
    name: Go (vet · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: check (gofmt · vet · build)
        run: make check

  # Full gomobile bind on every push/PR: this is where real breakage shows up
  # (unbindable types, cgo/NDK cross-compile), which the pure-Go `check` job
  # can't catch. The built AAR is uploaded as a workflow artifact so it can be
  # pulled for on-device testing without cutting a release.
  # Full AAR compile as verification on main pushes and PRs. On dev the snapshot
  # workflow already builds and publishes, so skip here to avoid a double build.
  bind:
    name: gomobile bind (AAR)
    if: github.ref != 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/build-aar
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: gtlv-aar-${{ github.sha }}
          path: |
            gtlv.aar
            gtlv-sources.jar
          if-no-files-found: error
