name: Release AAR

# On a version tag (on main), build the AAR and publish an immutable release
# version io.github.cca2878:gtlv-mobile:<tag without v> to GitHub Packages (Maven).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: release → GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/build-aar
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/publish-packages
        with:
          version: ${{ steps.v.outputs.version }}
