name: Release AAR

# On a version tag, build the Android AAR with gomobile and attach it to the
# GitHub Release. This is the "wheel-like" distribution for Android consumers:
# they add the AAR via Gradle and never install Go / gomobile / the NDK.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create/upload release assets

jobs:
  aar:
    name: gomobile bind → AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/build-aar
      - name: Attach AAR to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            gtlv.aar
            gtlv-sources.jar
